{% extends 'base.html' %}

{% block content %}

<div class="container">

    <div class="row justify-content-center">

        <div class="col-lg-5">

            <div class="card p-5">

                <div class="text-center mb-4">

                    <i class="fa-solid fa-user-plus fa-4x text-success"></i>

                    <h2 class="mt-3">

                        Create Account

                    </h2>

                    <p class="text-muted">

                        Register to start creating surveys.

                    </p>

                </div>

                {% if error %}
                <div class="alert alert-danger">
                    {{ error }}
                </div>
                {% endif %}

                <form method="POST">

                    <div class="mb-3">

                        <label>Username</label>

                        <input
                            type="text"
                            name="username"
                            class="form-control"
                            placeholder="Enter username"
                            required>

                    </div>

                    <div class="mb-3">

                        <label>Email</label>

                        <input
                            type="email"
                            name="email"
                            class="form-control"
                            placeholder="Enter email"
                            required>

                    </div>

                    <div class="mb-4">

                        <label>Password</label>

                        <input
                            type="password"
                            name="password"
                            class="form-control"
                            placeholder="Create password"
                            required>

                    </div>

                    <button class="btn btn-success w-100">

                        <i class="fa-solid fa-user-plus"></i>

                        Register

                    </button>

                </form>

                <hr>

                <p class="text-center">

                    Already have an account?

                    <a href="/login">

                        Login

                    </a>

                </p>

            </div>

        </div>

    </div>

</div>

{% endblock %}
