{% extends 'base.html' %}

{% block content %}

<div class="container">

    <div class="row justify-content-center">

        <div class="col-lg-10">

            <div class="card analytics-card">

                <i class="fa-solid fa-chart-column fa-4x text-primary mb-3"></i>

                <h2>Survey Analytics</h2>

                <p class="text-muted">

                    Response analysis for this survey.

                </p>

                {% if chart_available %}

                    <img
                        src="{{ url_for('static', filename='images/chart.png') }}"
                        class="img-fluid rounded shadow mt-4">

                {% else %}

                    <div class="alert alert-warning mt-4">

                        No responses available yet.

                    </div>

                {% endif %}

                <div class="mt-4">

                    <a href="/surveys"
                       class="btn btn-primary">

                        <i class="fa-solid fa-arrow-left"></i>

                        Back to Surveys

                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
