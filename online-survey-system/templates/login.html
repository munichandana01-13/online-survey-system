{% extends 'base.html' %}

{% block content %}

<div class="container">

    <div class="row justify-content-center">

        <div class="col-lg-5">

            <div class="card p-5">

                <div class="text-center mb-4">

                    <i class="fa-solid fa-user-lock fa-4x text-primary"></i>

                    <h2 class="mt-3">Welcome Back</h2>

                    <p class="text-muted">
                        Login to your account
                    </p>

                </div>

                {% if error %}
                <div class="alert alert-danger">
                    {{ error }}
                </div>
                {% endif %}

                <form method="POST">

                    <div class="mb-3">

                        <label>Email Address</label>

                        <input
                            type="email"
                            name="email"
                            class="form-control"
                            placeholder="Enter your email"
                            required>

                    </div>

                    <div class="mb-4">

                        <label>Password</label>

                        <input
                            type="password"
                            name="password"
                            class="form-control"
                            placeholder="Enter your password"
                            required>

                    </div>

                    <button class="btn btn-primary w-100">

                        <i class="fa-solid fa-right-to-bracket"></i>

                        Login

                    </button>

                </form>

                <hr>

                <p class="text-center">

                    Don't have an account?

                    <a href="/register">
                        Register
                    </a>

                </p>

            </div>

        </div>

    </div>

</div>

{% endblock %}
