{% extends 'base.html' %}

{% block content %}

<div class="container">

    <div class="text-center mb-5">

        <h1>Available Surveys</h1>

        <p class="text-muted">
            Select a survey to participate or view analytics.
        </p>

    </div>

    <div class="row">

        {% for survey in surveys %}

        <div class="col-lg-6 mb-4">

            <div class="card survey-card h-100">

                <div class="card-body">

                    <span class="badge bg-primary mb-3">

                        Survey #{{ survey[0] }}

                    </span>

                    <h3>{{ survey[1] }}</h3>

                    <p class="mt-3">

                        {{ survey[2] }}

                    </p>

                    <hr>

                    <div class="d-flex gap-2 flex-wrap">

                        <a href="/survey/{{ survey[0] }}"
                           class="btn btn-success">

                            <i class="fa-solid fa-play"></i>

                            Take Survey

                        </a>

                        <a href="/analytics/{{ survey[0] }}"
                           class="btn btn-info">

                            <i class="fa-solid fa-chart-column"></i>

                            Analytics

                        </a>

                    </div>

                </div>

            </div>

        </div>

        {% endfor %}

    </div>

</div>

{% endblock %}
